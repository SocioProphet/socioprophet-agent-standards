name: Multi-Domain Geospatial Agent Standards

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate agent runtime profiles and fixtures
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate multi-domain geospatial agent standards
        run: make multidomain-geospatial-agent-validate
